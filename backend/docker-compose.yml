services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hybrid_app
      POSTGRES_USER: hybrid_user
      POSTGRES_PASSWORD: hybrid_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hybrid_user -d hybrid_app"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ADDR: ":8080"
      DATABASE_URL: "postgres://hybrid_user:hybrid_pass@postgres:5432/hybrid_app?sslmode=disable"
      MONGODB_URI: "mongodb://mongo:27017"
      MONGODB_DB: "hybrid_app"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
